name: Finalize Besednice input E2E

on:
  push:
    branches:
      - agent/besednice-vertical-slice
    paths:
      - .github/workflows/finalize-besednice-input-e2e.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: agent/besednice-vertical-slice
          fetch-depth: 0

      - name: Use the canonical action key and simple tractor chase
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("tests/mobile-smoke.spec.mjs")
          text = path.read_text(encoding="utf-8")
          old_action = '''async function contextualAction(page) {
            const action = page.locator("#actionButton");
            await expect(action).toHaveAttribute("aria-disabled", "false");
            const box = await action.boundingBox();
            expect(box).not.toBeNull();
            if (!box) throw new Error("Action button has no touch target.");

            const pointer = {
              pointerId: 91,
              pointerType: "touch",
              isPrimary: true,
              button: 0,
              buttons: 1,
              clientX: box.x + box.width / 2,
              clientY: box.y + box.height / 2,
              bubbles: true,
              cancelable: true
            };
            await action.dispatchEvent("pointerdown", pointer);
            await page.waitForTimeout(50);
            await action.dispatchEvent("pointerup", { ...pointer, buttons: 0 });
            await expectReleasedInput(page);
          }'''
          new_action = '''async function contextualAction(page) {
            const action = page.locator("#actionButton");
            await expect(action).toHaveAttribute("aria-disabled", "false");
            await page.keyboard.down("e");
            await page.waitForTimeout(50);
            await page.keyboard.up("e");
            await expectReleasedInput(page);
          }'''
          if old_action not in text:
            raise SystemExit("pointer action block not found")
          text = text.replace(old_action, new_action, 1)

          start = text.index('async function chaseTractorUntilDanger(page) {')
          end = text.index('\nconst compactTransform', start)
          replacement = '''async function chaseTractorUntilDanger(page) {
            for (let step = 0; step < 140; step++) {
              const state = await snapshot(page);
              if (state.session.danger > 0) return state;
              const player = state.chlum?.runtime?.player;
              const tractor = state.chlum?.runtime?.tractor;
              if (!player || !tractor) throw new Error("Chlum tractor chase data is unavailable.");
              const dx = tractor.x - player.x;
              const dy = tractor.y - player.y;
              const keys = [];
              if (Math.abs(dx) > 18) keys.push(dx > 0 ? "ArrowRight" : "ArrowLeft");
              if (Math.abs(dy) > 18) keys.push(dy > 0 ? "ArrowUp" : "ArrowDown");
              if (!keys.length) keys.push("ArrowRight");
              await holdKeys(page, keys, 140);
            }
            throw new Error("Tractor did not trigger danger during an actual input-driven chase.");
          }
          '''
          text = text[:start] + replacement + text[end:]
          path.write_text(text, encoding="utf-8")
          Path(".github/workflows/finalize-besednice-input-e2e.yml").unlink()
          PY

          node --check tests/mobile-smoke.spec.mjs

      - name: Commit canonical input E2E correction
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/mobile-smoke.spec.mjs .github/workflows/finalize-besednice-input-e2e.yml
          git commit -m "test(besednice): use canonical action input"
          git push origin HEAD:agent/besednice-vertical-slice
