name: Patch Besednice mobile action

on:
  push:
    branches:
      - agent/besednice-vertical-slice
    paths:
      - .github/workflows/patch-besednice-action.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: agent/besednice-vertical-slice
          fetch-depth: 0
      - name: Use the actual mobile action button
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          target = Path("tests/mobile-smoke.spec.mjs")
          text = target.read_text(encoding="utf-8")
          before = '''async function contextualAction(page) {
            await page.keyboard.press("Space");
          }'''
          after = '''async function contextualAction(page) {
            const action = page.locator("#actionButton");
            await expect(action).toHaveAttribute("aria-disabled", "false");
            await action.tap();
          }'''
          if before not in text:
            raise SystemExit("contextualAction marker not found")
          target.write_text(text.replace(before, after, 1), encoding="utf-8")
          Path(".github/workflows/patch-besednice-action.yml").unlink()
          PY
          node --check tests/mobile-smoke.spec.mjs
      - name: Commit mobile input correction
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/mobile-smoke.spec.mjs .github/workflows/patch-besednice-action.yml
          git commit -m "test(besednice): use touch action in mobile flow"
          git push origin HEAD:agent/besednice-vertical-slice
