name: Patch Besednice clue dedupe assertion

on:
  push:
    branches:
      - agent/besednice-vertical-slice
    paths:
      - .github/workflows/patch-besednice-clue-dedupe.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: agent/besednice-vertical-slice
          fetch-depth: 0
      - name: Assert one-shot clue without performing a disabled action
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          target = Path("tests/mobile-smoke.spec.mjs")
          text = target.read_text(encoding="utf-8")
          before = '''    const beforeDuplicate = (await snapshot(page)).besednice.runtime.clues;
              await contextualAction(page);
              await expect.poll(() => page.evaluate(() => window.__lovecRuntime.snapshot().besednice.runtime.clues)).toBe(beforeDuplicate);'''
          after = '''    const beforeDuplicate = (await snapshot(page)).besednice.runtime.clues;
              await expect(page.locator("#actionButton")).toHaveAttribute("aria-disabled", "true");
              await page.waitForTimeout(120);
              await expect.poll(() => page.evaluate(() => window.__lovecRuntime.snapshot().besednice.runtime.clues)).toBe(beforeDuplicate);'''
          if before not in text:
            raise SystemExit("clue duplicate block not found")
          target.write_text(text.replace(before, after, 1), encoding="utf-8")
          Path(".github/workflows/patch-besednice-clue-dedupe.yml").unlink()
          PY
          node --check tests/mobile-smoke.spec.mjs
      - name: Commit one-shot clue assertion
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/mobile-smoke.spec.mjs .github/workflows/patch-besednice-clue-dedupe.yml
          git commit -m "test(besednice): assert disabled discovered clue"
          git push origin HEAD:agent/besednice-vertical-slice
