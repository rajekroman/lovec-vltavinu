name: Validate game

on:
  push:
    branches:
      - main
      - "agent/**"
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    name: Static and unit validation
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Check JavaScript syntax
        run: |
          node --check game.js
          node --check runtime-stability.js
          node --check tools/validate.mjs
          find src -type f -name '*.js' -print0 | xargs -0 -n1 node --check
          find tests/unit -type f -name '*.mjs' -print0 | xargs -0 -n1 node --check

      - name: Validate static build
        run: |
          mkdir -p test-results
          set -o pipefail
          node tools/validate.mjs 2>&1 | tee test-results/static-validation.log

      - name: Test modular core
        run: npm run test:unit

      - name: Upload static validation report
        if: ${{ always() }}
        uses: actions/upload-artifact@v5
        with:
          name: static-validation-report
          path: test-results/static-validation.log
          if-no-files-found: ignore
          retention-days: 14

  browser-smoke:
    name: Mobile browser smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install test dependencies
        run: npm install --no-audit --no-fund --no-package-lock

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run mobile smoke tests
        run: npm run test:smoke

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 14
