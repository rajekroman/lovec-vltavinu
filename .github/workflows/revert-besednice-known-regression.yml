name: Revert known Besednice regression

on:
  push:
    branches:
      - agent/besednice-vertical-slice
    paths:
      - .github/workflows/revert-besednice-known-regression.yml

permissions:
  contents: write

jobs:
  revert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: agent/besednice-vertical-slice
          fetch-depth: 0

      - name: Revert the post-green regression exactly
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git revert 16ab84e3db6794add9567bdd2981378a900a5333 --no-edit
          rm .github/workflows/revert-besednice-known-regression.yml
          git add .github/workflows/revert-besednice-known-regression.yml
          git commit -m "chore: remove temporary regression revert workflow"
          git push origin HEAD:agent/besednice-vertical-slice
