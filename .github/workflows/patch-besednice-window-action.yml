name: Patch Besednice window action event

on:
  push:
    branches:
      - agent/besednice-vertical-slice
    paths:
      - .github/workflows/patch-besednice-window-action.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: agent/besednice-vertical-slice
          fetch-depth: 0
      - name: Dispatch focus-independent action through DomInputAdapter
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          target = Path("tests/mobile-smoke.spec.mjs")
          text = target.read_text(encoding="utf-8")
          before = '''async function contextualAction(page) {
            const action = page.locator("#actionButton");
            await expect(action).toHaveAttribute("aria-disabled", "false");
            await page.evaluate(() => document.activeElement?.blur?.());
            await page.keyboard.down("e");
            await page.waitForTimeout(50);
            await page.keyboard.up("e");
            await expectReleasedInput(page);
          }'''
          after = '''async function contextualAction(page) {
            const action = page.locator("#actionButton");
            await expect(action).toHaveAttribute("aria-disabled", "false");
            await page.evaluate(() => window.dispatchEvent(new KeyboardEvent("keydown", {
              code: "KeyE",
              key: "e",
              bubbles: true,
              cancelable: true
            })));
            await expect.poll(async () => Boolean((await inputSnapshot(page)).actions.action?.down), {
              timeout: 1_000,
              intervals: [10, 20, 30]
            }).toBe(true);
            await page.waitForTimeout(100);
            await page.evaluate(() => window.dispatchEvent(new KeyboardEvent("keyup", {
              code: "KeyE",
              key: "e",
              bubbles: true,
              cancelable: true
            })));
            await expectReleasedInput(page);
          }'''
          if before not in text:
            raise SystemExit("focus-neutral contextualAction helper not found")
          target.write_text(text.replace(before, after, 1), encoding="utf-8")
          Path(".github/workflows/patch-besednice-window-action.yml").unlink()
          PY
          node --check tests/mobile-smoke.spec.mjs
      - name: Commit focus-independent action path
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/mobile-smoke.spec.mjs .github/workflows/patch-besednice-window-action.yml
          git commit -m "test(besednice): dispatch action on window"
          git push origin HEAD:agent/besednice-vertical-slice
