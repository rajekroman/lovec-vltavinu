name: Patch Besednice focus-neutral action

on:
  push:
    branches:
      - agent/besednice-vertical-slice
    paths:
      - .github/workflows/patch-besednice-key-action.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: agent/besednice-vertical-slice
          fetch-depth: 0
      - name: Use focus-neutral KeyE through DomInputAdapter
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          target = Path("tests/mobile-smoke.spec.mjs")
          text = target.read_text(encoding="utf-8")
          before = '''async function contextualAction(page) {
            const action = page.locator("#actionButton");
            await expect(action).toHaveAttribute("aria-disabled", "false");
            await action.evaluate(element => element.click());
            await page.waitForTimeout(50);
            await expectReleasedInput(page);
          }'''
          after = '''async function contextualAction(page) {
            const action = page.locator("#actionButton");
            await expect(action).toHaveAttribute("aria-disabled", "false");
            await page.evaluate(() => document.activeElement?.blur?.());
            await page.keyboard.down("e");
            await page.waitForTimeout(50);
            await page.keyboard.up("e");
            await expectReleasedInput(page);
          }'''
          if before not in text:
            raise SystemExit("native contextualAction helper not found")
          target.write_text(text.replace(before, after, 1), encoding="utf-8")
          Path(".github/workflows/patch-besednice-key-action.yml").unlink()
          PY
          node --check tests/mobile-smoke.spec.mjs
      - name: Commit focus-neutral action path
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/mobile-smoke.spec.mjs .github/workflows/patch-besednice-key-action.yml
          git commit -m "test(besednice): hold focus-neutral action key"
          git push origin HEAD:agent/besednice-vertical-slice
