name: Finalize Besednice collect E2E

on:
  push:
    branches:
      - agent/besednice-vertical-slice
    paths:
      - .github/workflows/finalize-besednice-collect-e2e.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: agent/besednice-vertical-slice
          fetch-depth: 0

      - name: Hold the action until the observable collection transition
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("tests/mobile-smoke.spec.mjs")
          text = path.read_text(encoding="utf-8")
          old_action = '''async function contextualAction(page) {
            const action = page.locator("#actionButton");
            await expect(action).toHaveAttribute("aria-disabled", "false");
            await page.keyboard.down("e");
            await page.waitForTimeout(50);
            await page.keyboard.up("e");
            await expectReleasedInput(page);
          }'''
          new_action = '''async function contextualAction(page) {
            const action = page.locator("#actionButton");
            await expect(action).toHaveAttribute("aria-disabled", "false");
            await page.evaluate(() => document.activeElement?.blur?.());
            await page.keyboard.down("e");
            await page.waitForTimeout(50);
            await page.keyboard.up("e");
            await expectReleasedInput(page);
          }

          async function holdContextualActionUntil(page, operation, timeout = 8_000) {
            const action = page.locator("#actionButton");
            await expect(action).toHaveAttribute("aria-disabled", "false");
            await page.evaluate(() => document.activeElement?.blur?.());
            await page.keyboard.down("e");
            try {
              await expect.poll(async () => {
                if (await operation()) return "complete";
                const input = await inputSnapshot(page);
                return input.actions.action?.down ? "waiting" : "not-pressed";
              }, { timeout, intervals: [20, 40, 80] }).toBe("complete");
            } finally {
              await page.keyboard.up("e");
            }
            await expectReleasedInput(page);
          }'''
          if old_action not in text:
            raise SystemExit("contextualAction block not found")
          text = text.replace(old_action, new_action, 1)

          old_collect = '''  await waitForInteraction(page, "collect");
            await contextualAction(page);

            await expect.poll(() => page.evaluate(() => {
              const state = window.__lovecRuntime.snapshot();
              return {
                finding: state.session.findings.some(entry => entry.findingId === "besednice-hedgehog-1"),
                started: state.besednice.runtime.boss.started
              };
            })).toEqual({ finding: true, started: true });'''
          new_collect = '''  await waitForInteraction(page, "collect");
            await holdContextualActionUntil(page, () => page.evaluate(() => {
              const state = window.__lovecRuntime.snapshot();
              const finding = state.session.findings.some(entry => entry.findingId === "besednice-hedgehog-1");
              return finding && state.besednice.runtime.boss.started === true;
            }));'''
          if old_collect not in text:
            raise SystemExit("Besednice collect block not found")
          path.write_text(text.replace(old_collect, new_collect, 1), encoding="utf-8")
          Path(".github/workflows/finalize-besednice-collect-e2e.yml").unlink()
          PY

          node --check tests/mobile-smoke.spec.mjs

      - name: Commit observable collection E2E correction
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/mobile-smoke.spec.mjs .github/workflows/finalize-besednice-collect-e2e.yml
          git commit -m "test(besednice): await observable collection"
          git push origin HEAD:agent/besednice-vertical-slice
