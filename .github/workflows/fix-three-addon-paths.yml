name: Fix local Three addon paths

on:
  pull_request:
    types: [synchronize, reopened]

permissions:
  contents: write

jobs:
  fix:
    if: ${{ github.head_ref == 'agent/asset-runtime-hardening' }}
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v5
        with:
          ref: agent/asset-runtime-hardening
      - name: Point official addons at the pinned local namespace
        run: |
          for file in vendor/three/addons/loaders/GLTFLoader.js vendor/three/addons/utils/BufferGeometryUtils.js vendor/three/addons/utils/SkeletonUtils.js; do
            sed -i "s#../../three.module.min.js#../../../three.module.min.js#g" "$file"
            sed -i "/@three_import/d" "$file"
          done
          grep -q "../../../three.module.min.js" vendor/three/addons/loaders/GLTFLoader.js
          ! grep -R "from 'three" vendor/three/addons
      - name: Commit local path adaptation
        run: |
          if git diff --quiet -- vendor/three/addons; then exit 0; fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add vendor/three/addons
          git commit -m "Adapt standard Three r185 addons to local namespace [paths-fixed]"
          git push origin HEAD:agent/asset-runtime-hardening
