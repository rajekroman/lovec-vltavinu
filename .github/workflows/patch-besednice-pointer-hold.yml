name: Patch Besednice pointer hold and spawn assertion

on:
  push:
    branches:
      - agent/besednice-vertical-slice
    paths:
      - .github/workflows/patch-besednice-pointer-hold.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: agent/besednice-vertical-slice
          fetch-depth: 0
      - name: Hold actual pointer through fixed update and assert spawn distance
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          target = Path("tests/mobile-smoke.spec.mjs")
          text = target.read_text(encoding="utf-8")
          before_action = '''async function contextualAction(page) {
            const action = page.locator("#actionButton");
            await expect(action).toHaveAttribute("aria-disabled", "false");
            await action.tap({ force: true });
          }'''
          after_action = '''async function contextualAction(page) {
            const action = page.locator("#actionButton");
            await expect(action).toHaveAttribute("aria-disabled", "false");
            const pointerId = await page.evaluate(() => {
              window.__lovecQaActionPointer = (window.__lovecQaActionPointer ?? 700) + 1;
              return window.__lovecQaActionPointer;
            });
            await action.dispatchEvent("pointerdown", {
              pointerId,
              pointerType: "touch",
              isPrimary: true,
              button: 0,
              buttons: 1
            });
            await page.waitForTimeout(50);
            await action.dispatchEvent("pointerup", {
              pointerId,
              pointerType: "touch",
              isPrimary: true,
              button: 0,
              buttons: 0
            });
            await expectReleasedInput(page);
          }'''
          before_spawn = '''  expect(state.chlum.runtime.player.x).toBeLessThan(190);
            expect(state.chlum.runtime.player.y).toBeLessThan(450);'''
          after_spawn = '''  expect(Math.hypot(
              state.chlum.runtime.player.x - 120,
              state.chlum.runtime.player.y - 380
            )).toBeLessThan(110);'''
          if before_action not in text:
            raise SystemExit("contextual action helper not found")
          if before_spawn not in text:
            raise SystemExit("tractor spawn assertions not found")
          text = text.replace(before_action, after_action, 1)
          text = text.replace(before_spawn, after_spawn, 1)
          target.write_text(text, encoding="utf-8")
          Path(".github/workflows/patch-besednice-pointer-hold.yml").unlink()
          PY
          node --check tests/mobile-smoke.spec.mjs
      - name: Commit deterministic pointer and spawn checks
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/mobile-smoke.spec.mjs .github/workflows/patch-besednice-pointer-hold.yml
          git commit -m "test(besednice): hold action pointer through fixed update"
          git push origin HEAD:agent/besednice-vertical-slice
