name: Patch Besednice native action activation

on:
  push:
    branches:
      - agent/besednice-vertical-slice
    paths:
      - .github/workflows/patch-besednice-native-action.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: agent/besednice-vertical-slice
          fetch-depth: 0
      - name: Use public native DOM activation path
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          target = Path("tests/mobile-smoke.spec.mjs")
          text = target.read_text(encoding="utf-8")
          before = '''async function contextualAction(page) {
            const action = page.locator("#actionButton");
            await expect(action).toHaveAttribute("aria-disabled", "false");
            const pointerId = await page.evaluate(() => {
              window.__lovecQaActionPointer = (window.__lovecQaActionPointer ?? 700) + 1;
              return window.__lovecQaActionPointer;
            });
            await action.dispatchEvent("pointerdown", {
              pointerId,
              pointerType: "touch",
              isPrimary: true,
              button: 0,
              buttons: 1
            });
            await page.waitForTimeout(50);
            await action.dispatchEvent("pointerup", {
              pointerId,
              pointerType: "touch",
              isPrimary: true,
              button: 0,
              buttons: 0
            });
            await expectReleasedInput(page);
          }'''
          after = '''async function contextualAction(page) {
            const action = page.locator("#actionButton");
            await expect(action).toHaveAttribute("aria-disabled", "false");
            await action.evaluate(element => element.click());
            await page.waitForTimeout(50);
            await expectReleasedInput(page);
          }'''
          if before not in text:
            raise SystemExit("pointer contextualAction helper not found")
          target.write_text(text.replace(before, after, 1), encoding="utf-8")
          Path(".github/workflows/patch-besednice-native-action.yml").unlink()
          PY
          node --check tests/mobile-smoke.spec.mjs
      - name: Commit native action activation
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/mobile-smoke.spec.mjs .github/workflows/patch-besednice-native-action.yml
          git commit -m "test(besednice): use native action activation"
          git push origin HEAD:agent/besednice-vertical-slice
