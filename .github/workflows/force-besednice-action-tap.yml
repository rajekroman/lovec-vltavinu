name: Force animated Besednice action tap

on:
  push:
    branches:
      - agent/besednice-vertical-slice
    paths:
      - .github/workflows/force-besednice-action-tap.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: agent/besednice-vertical-slice
          fetch-depth: 0
      - name: Bypass only permanent ready animation stability check
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          target = Path("tests/mobile-smoke.spec.mjs")
          text = target.read_text(encoding="utf-8")
          before = '  await action.tap();'
          after = '  await action.tap({ force: true });'
          if before not in text:
            raise SystemExit("unforced action tap not found")
          target.write_text(text.replace(before, after, 1), encoding="utf-8")
          Path(".github/workflows/force-besednice-action-tap.yml").unlink()
          PY
          node --check tests/mobile-smoke.spec.mjs
      - name: Commit deterministic mobile touch
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/mobile-smoke.spec.mjs .github/workflows/force-besednice-action-tap.yml
          git commit -m "test(besednice): force tap through ready animation"
          git push origin HEAD:agent/besednice-vertical-slice
