name: Finalize Besednice E2E corrections

on:
  push:
    branches:
      - agent/besednice-vertical-slice
    paths:
      - .github/workflows/patch-besednice-action-transient.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: agent/besednice-vertical-slice
          fetch-depth: 0

      - name: Apply deterministic mobile input and respawn assertions
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          mobile_path = Path("tests/mobile-smoke.spec.mjs")
          mobile = mobile_path.read_text(encoding="utf-8")

          old_action = '''async function contextualAction(page) {
            const action = page.locator("#actionButton");
            await expect(action).toHaveAttribute("aria-disabled", "false");
            await page.evaluate(() => window.dispatchEvent(new KeyboardEvent("keydown", {
              code: "KeyE",
              key: "e",
              bubbles: true,
              cancelable: true
            })));
            await page.waitForTimeout(100);
            await page.evaluate(() => window.dispatchEvent(new KeyboardEvent("keyup", {
              code: "KeyE",
              key: "e",
              bubbles: true,
              cancelable: true
            })));
            await expectReleasedInput(page);
          }'''
          new_action = '''async function contextualAction(page) {
            const action = page.locator("#actionButton");
            await expect(action).toHaveAttribute("aria-disabled", "false");
            await action.tap();
            await expectReleasedInput(page);
          }'''
          if old_action not in mobile:
            raise SystemExit("contextualAction block not found")
          mobile = mobile.replace(old_action, new_action, 1)

          old_respawn = '''  const state = await chaseTractorUntilDanger(page);
            expect(state.session.danger).toBeGreaterThan(0);
            expect(Math.hypot(
              state.chlum.runtime.player.x - 120,
              state.chlum.runtime.player.y - 380
            )).toBeLessThan(110);'''
          new_respawn = '''  const state = await chaseTractorUntilDanger(page);
            expect(state.session.danger).toBeGreaterThan(0);
            await expect.poll(async () => {
              const current = await snapshot(page);
              const player = current.chlum?.runtime?.player;
              return player ? Math.hypot(player.x - 120, player.y - 380) : Number.POSITIVE_INFINITY;
            }, { timeout: 2_000, intervals: [20, 40, 80] }).toBeLessThan(12);'''
          if old_respawn not in mobile:
            raise SystemExit("tractor respawn assertion not found")
          mobile = mobile.replace(old_respawn, new_respawn, 1)
          mobile_path.write_text(mobile, encoding="utf-8")

          contract_path = Path("tests/unit/besednice-production-contract.test.mjs")
          contract = contract_path.read_text(encoding="utf-8")
          old_contract = '''  assert.match(mobileSmoke, /window\\.dispatchEvent\\(new KeyboardEvent\\("keydown"/);
            assert.match(mobileSmoke, /code: "KeyE"/);
            assert.match(mobileSmoke, /actions\\.action\\?\\.down/);
            assert.match(mobileSmoke, /page\\.waitForTimeout\\(100\\)/);
            assert.match(mobileSmoke, /window\\.dispatchEvent\\(new KeyboardEvent\\("keyup"/);
            assert.doesNotMatch(mobileSmoke, /page\\.keyboard\\.press\\("Space"\\)/);
            assert.doesNotMatch(mobileSmoke, /action\\.evaluate\\(element => element\\.click\\(\\)\\)/);
            assert.match(mobileSmoke, /beforeDuplicate[\\s\\S]*aria-disabled", "true"[\\s\\S]*toBe\\(beforeDuplicate\\)/);
            assert.match(mobileSmoke, /Math\\.hypot\\([\\s\\S]*player\\.x - 120[\\s\\S]*player\\.y - 380[\\s\\S]*toBeLessThan\\(110\\)/);'''
          new_contract = '''  assert.match(mobileSmoke, /await action\\.tap\\(\\)/);
            assert.doesNotMatch(mobileSmoke, /window\\.dispatchEvent\\(new KeyboardEvent\\("keydown"/);
            assert.doesNotMatch(mobileSmoke, /code: "KeyE"/);
            assert.doesNotMatch(mobileSmoke, /page\\.keyboard\\.press\\("Space"\\)/);
            assert.doesNotMatch(mobileSmoke, /action\\.evaluate\\(element => element\\.click\\(\\)\\)/);
            assert.match(mobileSmoke, /beforeDuplicate[\\s\\S]*aria-disabled", "true"[\\s\\S]*toBe\\(beforeDuplicate\\)/);
            assert.match(mobileSmoke, /expect\\.poll\\(async \\(\\) => \\{[\\s\\S]*Math\\.hypot\\(player\\.x - 120, player\\.y - 380\\)[\\s\\S]*toBeLessThan\\(12\\)/);'''
          if old_contract not in contract:
            raise SystemExit("production contract input block not found")
          contract_path.write_text(contract.replace(old_contract, new_contract, 1), encoding="utf-8")

          Path(".github/workflows/patch-besednice-action-transient.yml").unlink()
          PY

          node --check tests/mobile-smoke.spec.mjs
          node --check tests/unit/besednice-production-contract.test.mjs

      - name: Commit final deterministic E2E correction
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/mobile-smoke.spec.mjs tests/unit/besednice-production-contract.test.mjs .github/workflows/patch-besednice-action-transient.yml
          git commit -m "test(besednice): use mobile action and await respawn"
          git push origin HEAD:agent/besednice-vertical-slice
